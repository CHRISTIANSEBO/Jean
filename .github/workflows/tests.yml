name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: "dummy-anthropic-key-for-tests"
      OPENAI_API_KEY: "dummy-openai-key-for-tests"
      ADMIN_EMAILS: "admin@example.com"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test Fernet key
        run: |
          echo "FERNET_KEY=$(python -c 'import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" >> "$GITHUB_ENV"

      - name: Run tests
        run: python -m pytest tests/ -v
